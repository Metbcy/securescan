name: SecureScan
description: Diff-aware security scan that posts PR comments and uploads SARIF.
branding:
  icon: shield
  color: blue

inputs:
  base-ref:
    description: Git ref to use as the "before" side. Defaults to the PR base sha.
    required: false
    default: ''
  head-ref:
    description: Git ref to use as the "after" side. Defaults to the PR head sha (immutable).
    required: false
    default: ''
  scan-types:
    description: Comma-separated scanners to run (code,dependency,iac,baseline,dast,network).
    required: false
    default: 'code'
  fail-on-severity:
    description: Exit non-zero if NEW findings >= this severity (none|critical|high|medium|low).
    required: false
    default: 'none'
  comment-on-pr:
    description: Post the diff as a PR comment (upserted via marker).
    required: false
    default: 'true'
  upload-sarif:
    description: Upload SARIF to the GitHub Security tab.
    required: false
    default: 'true'
  image-tag:
    description: Tag of ghcr.io/metbcy/securescan to use when falling back to the container.
    required: false
    default: 'latest'
  prefer-image:
    description: Skip the wheel install path and always run the container.
    required: false
    default: 'false'
  baseline:
    description: Path (relative to repo root) of a baseline JSON file to suppress legacy findings.
    required: false
    default: ''
  github-token:
    description: Token used for PR comment upsert. Defaults to GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}
  pr-mode:
    description: |
      Where to post the diff: "summary" posts a single PR comment summarizing
      all findings (the v0.2.0 default); "inline" posts a single GitHub Review
      with one inline comment per finding anchored at the offending line; "both"
      posts both. Inline mode requires pull-requests: write permission and the
      standard pull_request event payload.
    required: false
    default: summary
  review-event:
    description: |
      Event type for the GitHub Review when pr-mode is "inline" or "both". One of:
      COMMENT (default), REQUEST_CHANGES (blocks merge via branch protection),
      APPROVE. Only effective when pr-mode includes inline review submission.
    required: false
    default: COMMENT
  inline-suggestions:
    description: |
      Include suggestion blocks in inline review comments (one-click apply for
      severity-pin / inline-ignore where SecureScan can construct a mechanical fix).
      Defaults to true; set to false for compact comment bodies.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Resolve inputs
      id: resolve
      shell: bash
      run: ${{ github.action_path }}/entrypoint-resolve.sh
      env:
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_HEAD_REF: ${{ inputs.head-ref }}
    - name: Run securescan diff
      shell: bash
      run: ${{ github.action_path }}/entrypoint.sh
      env:
        INPUT_BASE_REF: ${{ steps.resolve.outputs.base_ref }}
        INPUT_HEAD_REF: ${{ steps.resolve.outputs.head_ref }}
        INPUT_SCAN_TYPES: ${{ inputs.scan-types }}
        INPUT_FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
        INPUT_COMMENT_ON_PR: ${{ inputs.comment-on-pr }}
        INPUT_UPLOAD_SARIF: ${{ inputs.upload-sarif }}
        INPUT_IMAGE_TAG: ${{ inputs.image-tag }}
        INPUT_PREFER_IMAGE: ${{ inputs.prefer-image }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_PR_MODE: ${{ inputs.pr-mode }}
        INPUT_REVIEW_EVENT: ${{ inputs.review-event }}
        INPUT_INLINE_SUGGESTIONS: ${{ inputs.inline-suggestions }}
    - name: Upload SARIF to Security tab
      if: always() && inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ github.workspace }}/.securescan/diff.sarif
        category: securescan
