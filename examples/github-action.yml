# Example: Add this to your repo at .github/workflows/security.yml
name: Security Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SecureScan
        run: |
          pip install git+https://github.com/Metbcy/securescan.git#subdirectory=backend
          pip install semgrep bandit

      - name: Run SecureScan
        run: |
          securescan scan . --type code --output sarif --output-file results.sarif --fail-on-severity high

      - name: Upload Results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
