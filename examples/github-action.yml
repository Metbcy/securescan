# Drop into .github/workflows/securescan.yml in your repo.
# Diff-aware security scan: posts a single upserted PR comment of NEW
# findings introduced by the PR, and uploads SARIF to the Security tab.
#
# Note: this Action runs `securescan` CLI directly. It does NOT call the
# FastAPI server, so SECURESCAN_API_KEY is not required for the Action
# path. The API key only matters when running the dashboard backend in
# production. See: https://github.com/Metbcy/securescan#production-deployment
#
# Place a `.securescan.yml` at your repo root to configure scan behavior;
# the action picks it up automatically. See:
#   https://github.com/Metbcy/securescan#configuration
#
# Behavior notes:
# - The PR comment is upserted via the marker `<!-- securescan:diff -->`,
#   so re-runs replace the previous comment in place instead of stacking.
# - SARIF uses stable per-finding fingerprints, so GitHub's Security tab
#   deduplicates across re-runs and won't raise spurious "new alert" noise.
# - Only NEW findings (introduced by the PR) drive `fail-on-severity`.

name: SecureScan

on:
  pull_request:
  push:
    branches: [main]   # also gate main pushes; comment is posted only on PRs

permissions:
  contents: read
  pull-requests: write     # for the upserted PR comment
  security-events: write   # for SARIF upload

jobs:
  securescan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # SecureScan needs the base ref to compute the diff.
          fetch-depth: 0

      - uses: Metbcy/securescan@v1
        with:
          scan-types: code,dependency
          fail-on-severity: high
          # baseline: .securescan/baseline.json    # optional: suppress legacy findings
          # comment-on-pr: true                    # default
          # upload-sarif: true                     # default

# Optional: inline review comments instead of (or alongside) a single
# summary PR comment. See: https://github.com/Metbcy/securescan#inline-pr-review-comments
#
# Replace the `with:` block above (or add a separate workflow file) with:
#
# - uses: Metbcy/securescan@v1
#   with:
#     pr-mode: inline
#     review-event: COMMENT
#     inline-suggestions: true
