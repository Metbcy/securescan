name: Lint & test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  # Cancel superseded runs on the same PR/branch.
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python — ruff, mypy, pytest, pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Some tests do `git diff <sha>..<sha>`. The default shallow
          # checkout (depth=1) doesn't include parent commits, so those
          # diffs fail with "fatal: bad object". Full history fixes it.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e './backend[dev,pdf]' mypy pytest-cov pip-audit
          # Install scanner CLIs that some tests assume are on PATH.
          # Use pipx to avoid pulling semgrep's click<8.2 pin into the
          # main env (which would crash typer at import time).
          pipx install semgrep
          pipx install bandit
      - name: ruff (lint)
        run: ruff check backend/
      - name: ruff (format check)
        run: ruff format --check backend/
      - name: mypy
        # 50 pre-existing mypy errors at v0.10.3 lint bring-up. Most are
        # legitimate `str | None` narrowings in cli/diff.py and cli/compare.py
        # that need code changes (not just annotations) to resolve cleanly.
        # Set to `false` once the count is at 0; tracked as a follow-up.
        continue-on-error: true
        run: mypy backend/securescan --ignore-missing-imports
      - name: pytest with coverage
        # Baseline measured at 79% on 2025-04-30 (887 tests). Floor set
        # 2 points below to absorb minor coverage drift on PRs without
        # masking real regressions.
        env:
          # Click/Typer's help renderer reads COLUMNS to lay out the
          # multi-column option table. CI's default is 0 (no TTY), which
          # collapses every help-flag-recognition test into an empty
          # frame. Pin a sane width so help tests get the same output
          # locally and in CI. (Most help-text tests have been migrated
          # to Click introspection, but this remains a safety net.)
          COLUMNS: '200'
        run: |
          cd backend
          # Deselected: test_github_review_output assumes a specific
          # git history layout that's brittle in CI checkouts (resolves
          # commits that don't exist in the runner's clone). Tracked
          # as a follow-up to harden the test fixture.
          pytest --cov=securescan --cov-fail-under=77 tests/ \
            --deselect tests/test_github_review_output.py::test_github_review_resolves_base_sha_from_base_ref_in_diff_ref_mode
      - name: pip-audit
        # pip-audit on PRs catches CVE-bumped deps immediately instead of
        # waiting for the weekly cron in securescan.yml. continue-on-error
        # because transitive-dep CVEs shouldn't block unrelated PRs.
        continue-on-error: true
        run: pip-audit ./backend --strict

  frontend:
    name: Frontend — eslint, tsc, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Production build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
