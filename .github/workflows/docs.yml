name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook + plugins
        run: |
          set -euo pipefail
          MDBOOK_VERSION=v0.4.52
          curl -L --output mdbook.tar.gz \
            "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf mdbook.tar.gz
          sudo mv mdbook /usr/local/bin/
          # Plugin versions are pinned to those known to work against the
          # mdBook 0.4.x RenderContext shape used above. Bumping any of
          # these requires re-testing locally.
          cargo install mdbook-mermaid --version 0.15.0 --locked
          cargo install mdbook-admonish --version 1.20.0 --locked
          cargo install mdbook-toc --version 0.14.2 --locked

      - name: Build
        working-directory: docs
        run: mdbook build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
