name: Container image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: Metbcy/securescan

jobs:
  build:
    name: Build multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}"
          # Lowercase the image name; GHCR rejects mixed-case paths.
          image_lc="$(echo "${image}" | tr '[:upper:]' '[:lower:]')"
          ref="${GITHUB_REF}"
          if [[ "${ref}" == refs/tags/v* ]]; then
            tag="${ref#refs/tags/}"
            tags="${image_lc}:${tag},${image_lc}:latest"
            push=true
          elif [[ "${ref}" == refs/heads/main ]]; then
            tags="${image_lc}:main"
            push=false
          else
            tags="${image_lc}:dev"
            push=false
          fi
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"
          echo "push=${push}" >> "${GITHUB_OUTPUT}"
          echo "Resolved tags: ${tags}"
          echo "Push: ${push}"

      - name: Build and (conditionally) push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.tags.outputs.push == 'true' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
