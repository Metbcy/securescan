name: Container image

# Build the multi-arch image on every push to main as a smoke test
# (does NOT push). For tag pushes, release.yml owns the build + sign +
# push path — duplicating the build here just creates a tag-pointer
# race (the unsigned image from this workflow can win the :vX.Y.Z tag
# pointer over the signed one from release.yml). See issue #1.
on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

# Cancel any in-flight build when a new commit lands. Multi-arch via
# QEMU is ~25-30 min; without this, every rapid-fire commit during a
# CI-fix cycle stacks another parallel build, and the queue never
# drains. This guarantees only the LATEST commit on main is being
# built at any one time.
concurrency:
  group: container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: Metbcy/securescan

jobs:
  build:
    name: Build multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}"
          # Lowercase the image name; GHCR rejects mixed-case paths.
          image_lc="$(echo "${image}" | tr '[:upper:]' '[:lower:]')"
          # main-branch builds are smoke-tests only — never push. Tag
          # pushes are handled by release.yml exclusively (this
          # workflow no longer triggers on tag pushes; see file
          # header comment).
          tags="${image_lc}:main"
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"
          echo "Resolved tags: ${tags} (smoke-test build, not pushing)"

      - name: Build (smoke-test, no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          # amd64-only on main pushes — multi-arch is exercised on
          # tag pushes via release.yml and is a 30-min build that's
          # not worth running on every commit.
          platforms: linux/amd64
          push: false
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
